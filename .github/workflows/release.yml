name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release npm package and binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Prepare release commit
        env:
          VERSION: ${{ inputs.version }}
          NPM_PACKAGE: ft-mcp
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Run releases from the main branch. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}. Use semver without a leading v, for example 1.2.3." >&2
            exit 1
          fi

          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN repository secret is required before running a release." >&2
            exit 1
          fi

          git fetch --tags origin
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists." >&2
            exit 1
          fi

          if npm view "${NPM_PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NPM_PACKAGE}@${VERSION} already exists on npm." >&2
            exit 1
          fi

          node <<'EOF'
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.version = process.env.VERSION;
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          EOF

          npm test
          npm publish --dry-run --access public

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Build and publish GitHub release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
