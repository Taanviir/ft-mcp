<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ft-mcp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #1f2328;
      line-height: 1.65;
      font-size: 15px;
    }

    .wrap { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    /* typography */
    #content h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -.03em;
      margin: 2rem 0 .375rem;
      line-height: 1.2;
    }
    #content h1:first-child { margin-top: 0; }
    #content h2 {
      font-size: 1.0625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #94a3b8;
      margin: 2.5rem 0 .875rem;
    }
    #content h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.5rem 0 .5rem;
    }
    #content p { margin-bottom: .75rem; color: #444d56; }
    #content a { color: #0969da; text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: .75rem; color: #444d56; }
    #content li { margin-bottom: .25rem; }
    #content hr { border: none; border-top: 1px solid #f1f5f9; margin: 2rem 0; }

    /* inline code */
    #content code {
      font-family: ui-monospace, "SFMono-Regular", monospace;
      font-size: .825em;
      background: #f1f5f9;
      padding: .15em .45em;
      border-radius: 4px;
      color: #334155;
    }

    /* code blocks — dark */
    .pre-wrap { position: relative; margin-bottom: 1rem; }
    #content pre {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 0;
    }
    #content pre code {
      background: none;
      padding: 0;
      font-size: .8rem;
      line-height: 1.75;
      color: #e2e8f0;
      border-radius: 0;
    }

    /* copy button */
    .copy-btn {
      position: absolute;
      top: .6rem;
      right: .6rem;
      padding: .25rem .65rem;
      font-size: .73rem;
      font-weight: 500;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 5px;
      cursor: pointer;
      color: #94a3b8;
      opacity: 0;
      transition: opacity .15s, background .15s;
    }
    .pre-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: #273344; color: #e2e8f0; }

    /* table */
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
    #content th {
      text-align: left;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #94a3b8;
      border-bottom: 1px solid #e2e8f0;
      padding: .5rem .75rem;
    }
    #content td {
      padding: .5rem .75rem;
      border-bottom: 1px solid #f1f5f9;
      color: #444d56;
      vertical-align: top;
    }
    #content td:first-child code { font-size: .8rem; }
    #content tr:last-child td { border-bottom: none; }

    /* details — accordion style */
    #content details {
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      margin-bottom: .5rem;
      overflow: hidden;
    }
    #content summary {
      cursor: pointer;
      font-weight: 500;
      font-size: .9rem;
      padding: .65rem 1rem;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: .5rem;
      background: #f8fafc;
    }
    #content summary::-webkit-details-marker { display: none; }
    #content summary::before {
      content: '';
      display: inline-block;
      width: .5rem;
      height: .5rem;
      border-right: 1.5px solid #94a3b8;
      border-bottom: 1.5px solid #94a3b8;
      transform: rotate(-45deg);
      transition: transform .2s;
      flex-shrink: 0;
    }
    #content details[open] summary::before { transform: rotate(45deg); }
    #content details[open] summary { border-bottom: 1px solid #e2e8f0; }
    #content details > :not(summary) { padding: .875rem 1rem; }
    #content details pre { border-radius: 6px; }

    /* loading / error */
    #status { color: #94a3b8; font-size: .9rem; padding: 2rem 0; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="status">Loading…</div>
  <div id="content"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  var RAW = 'https://raw.githubusercontent.com/Taanviir/ft-mcp/main/README.md';

  fetch(RAW)
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    })
    .then(function(md) {
      document.getElementById('status').style.display = 'none';
      document.getElementById('content').innerHTML = marked.parse(md);
      rewriteRelativeLinks();
      addCopyButtons();
    })
    .catch(function(e) {
      document.getElementById('status').textContent = 'Failed to load README (' + e.message + ')';
    });

  function rewriteRelativeLinks() {
    var base = 'https://github.com/Taanviir/ft-mcp/blob/main/';
    document.querySelectorAll('#content a[href]').forEach(function(a) {
      var href = a.getAttribute('href');
      if (!href.match(/^(https?:|mailto:|#)/)) {
        a.href = base + href;
        a.target = '_blank';
        a.rel = 'noopener';
      }
    });
  }

  function addCopyButtons() {
    document.querySelectorAll('#content pre').forEach(function(pre) {
      var wrap = document.createElement('div');
      wrap.className = 'pre-wrap';
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(pre);

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var code = pre.querySelector('code');
        var text = code ? code.innerText : pre.innerText;
        navigator.clipboard.writeText(text).catch(function() {
          var ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        });
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
      });
      wrap.appendChild(btn);
    });
  }
</script>
</body>
</html>
