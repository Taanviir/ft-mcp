<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ft-mcp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .08);
    }

    h1 { font-size: 1.125rem; font-weight: 700; margin-bottom: .25rem; }

    .desc {
      color: #64748b;
      font-size: .875rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .desc a { color: #3b82f6; text-decoration: none; }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .25rem;
    }

    input[type=text], input[type=password] {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 1rem;
      background: #fafafa;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
    }

    .btn {
      width: 100%;
      padding: .625rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #2563eb; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: .75rem;
      border-radius: 6px;
      font-size: .8125rem;
      margin-bottom: 1rem;
    }

    .result {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e2e8f0;
    }
    .result-title { font-size: .8125rem; font-weight: 600; color: #374151; margin-bottom: .5rem; }

    .token-row { display: flex; gap: .375rem; margin-bottom: .75rem; }
    .token-row input {
      flex: 1;
      font-family: ui-monospace, monospace;
      font-size: .75rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: .5rem .625rem;
    }

    .copy-btn {
      padding: .5rem .875rem;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: .8125rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #e2e8f0; }

    .usage { font-size: .8rem; color: #64748b; line-height: 1.6; }
    .usage code {
      font-family: ui-monospace, monospace;
      background: #f1f5f9;
      padding: .1em .35em;
      border-radius: 4px;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ft-mcp</h1>
    <p class="desc">
      Enter your <a href="https://profile.intra.42.fr/oauth/applications" target="_blank" rel="noopener">42 API credentials</a>
      to get a bearer token for your MCP client.
    </p>
    {{ERROR}}
    <form method="POST" action="/token">
      <input type="hidden" name="_source" value="ui">
      <input type="hidden" name="grant_type" value="client_credentials">
      <label for="cid">Client UID</label>
      <input type="text" id="cid" name="client_id" placeholder="u-s4t2ud-…" autocomplete="off" spellcheck="false" required>
      <label for="csec">Client Secret</label>
      <input type="password" id="csec" name="client_secret" placeholder="s-s4t2ud-…" autocomplete="off" required>
      <button class="btn" type="submit">Get token</button>
    </form>
    {{RESULT}}
  </div>
  <script>
    function copyToken() {
      var el = document.getElementById("tok");
      el.select();
      el.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(el.value).catch(function () { document.execCommand("copy"); });
      var b = document.getElementById("cpbtn");
      b.textContent = "Copied!";
      setTimeout(function () { b.textContent = "Copy"; }, 2000);
    }
  </script>
</body>
</html>
